<?xml version="1.0" encoding="UTF-8"?>
<!--
  AyuVinc · LinkedIn Profile / Company Logo · Light ground
  400 x 400 · monochrome inversion of dark master
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 400 400"
     width="400" height="400"
     role="img" aria-label="AyuVinc — Healthcare Infrastructure">
  <defs>
    <style type="text/css"><![CDATA[
      @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300&family=DM+Sans:wght@400&display=swap');
      .bg   { fill: #f5f4f0; }
      .wm   { font-family: 'Space Grotesk', sans-serif; font-weight: 300; font-size: 52px; letter-spacing: 2.08px; fill: #090d18; }
      .desc { font-family: 'DM Sans', sans-serif;       font-weight: 400; font-size: 9px;  letter-spacing: 2.34px; fill: #090d18; fill-opacity: 0.30; }
    ]]></style>
  </defs>
  <rect class="bg" width="400" height="400"/>
  <text class="wm"   x="44" y="208">AyuVinc</text>
  <text class="desc" x="46" y="234">HEALTHCARE INFRASTRUCTURE</text>
</svg>
